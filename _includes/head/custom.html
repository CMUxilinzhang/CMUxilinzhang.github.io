<!-- ============================================================
     Elegant academic restyle — serif headings, refined layout,
     warm off-white palette, subtle hover motion.
     Layered on top of the theme (loads after main.css).
     ============================================================ -->
<style>
  :root {
    --ink:        #24211c;   /* warm near-black text */
    --ink-soft:   #55514a;   /* secondary text */
    --muted:      #8a847a;   /* labels / meta */
    --paper:      #faf8f3;   /* warm off-white background */
    --line:       #e7e2d8;   /* hairline dividers */
    --accent:     #7a1f2b;   /* muted CMU-ish deep red */
    --accent-2:   #2f6d5b;   /* subtle green for hover accents */
    --link:       #7a1f2b;
    --radius:     10px;
  }

  /* ---------- base typography ---------- */
  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body {
    font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
    color: var(--ink);
    background: var(--paper);
    font-size: 17px;
    line-height: 1.72;
    letter-spacing: 0.1px;
  }
  .page__content { font-size: 1rem; }
  .page__content p { color: var(--ink-soft); }

  /* headings in an elegant serif */
  h1, h2, h3, h4, .page__title, .archive__item-title,
  .page__content h1, .page__content h2, .page__content h3 {
    font-family: 'Newsreader', Georgia, 'Times New Roman', serif !important;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.25;
    font-weight: 600;
  }

  /* page (name) title */
  .page__title { font-size: 2.2rem; font-weight: 600; margin-bottom: .3rem; }

  /* ---------- section headers (## News / ## Publications) ----------
     turn h2 into small, uppercase, letter-spaced labels with a hairline */
  .page__content h2 {
    font-family: 'Inter', sans-serif !important;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    margin: 2.6rem 0 1.1rem;
    padding-bottom: 0.55rem;
    border-bottom: 1px solid var(--line);
  }
  .page__content h3 { font-size: 1.25rem; margin-top: 1.6rem; }

  /* soften the markdown horizontal rules into airy hairlines */
  .page__content hr { border: 0; border-top: 1px solid var(--line); margin: 2.4rem 0; opacity: 1; }

  /* ---------- links ---------- */
  a, .page__content a { color: var(--link); text-decoration: none; transition: color .18s ease, border-color .18s ease; }
  .page__content a:not(.btn) {
    border-bottom: 1px solid rgba(122,31,43,0.25);
    padding-bottom: 1px;
  }
  .page__content a:not(.btn):hover { color: var(--accent-2); border-bottom-color: var(--accent-2); }

  /* ---------- masthead / top nav ---------- */
  .masthead {
    background: rgba(250,248,243,0.85);
    -webkit-backdrop-filter: saturate(180%) blur(8px);
    backdrop-filter: saturate(180%) blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .greedy-nav { background: transparent; }
  .greedy-nav a { color: var(--ink-soft); font-weight: 500; font-family: 'Inter', sans-serif; letter-spacing: 0.02em; }
  .greedy-nav .site-title {
    font-family: 'Newsreader', serif !important;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  /* animated underline on nav hover */
  .greedy-nav a:not(.site-title) { position: relative; }
  .greedy-nav a:not(.site-title)::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 2px;
    height: 1.5px; background: var(--accent);
    transform: scaleX(0); transform-origin: left;
    transition: transform .25s ease;
  }
  .greedy-nav a:not(.site-title):hover { color: var(--accent); }
  .greedy-nav a:not(.site-title):hover::after { transform: scaleX(1); }
  .greedy-nav .visible-links a:before { background: var(--accent); height: 2px; }

  /* ---------- author sidebar ---------- */
  .author__avatar img {
    border-radius: 50%;
    border: 1px solid var(--line);
    box-shadow: 0 6px 22px rgba(36,33,28,0.10);
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .author__avatar img:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(36,33,28,0.16); }
  .author__name { font-family: 'Newsreader', serif !important; font-weight: 600; }
  .author__bio { color: var(--ink-soft); }
  .author__urls a { transition: color .18s ease; }
  .author__urls a:hover { color: var(--accent); }

  /* ---------- News list refinement ---------- */
  .news-list {
    background: #fffdf9 !important;
    border: 1px solid var(--line) !important;
    border-radius: var(--radius) !important;
    box-shadow: 0 1px 2px rgba(36,33,28,0.03);
  }
  .news-list .news-date { color: var(--accent) !important; font-weight: 600; white-space: nowrap; }
  .news-list .news-text { color: var(--ink-soft) !important; }
  /* tidy scrollbar */
  .news-list::-webkit-scrollbar { width: 8px; }
  .news-list::-webkit-scrollbar-thumb { background: #e0dacd; border-radius: 8px; }

  /* ---------- Publications entry ---------- */
  .pub-entry {
    padding: 1.1rem 1.2rem;
    border: 1px solid transparent;
    border-radius: var(--radius);
    transition: background .2s ease, border-color .2s ease, box-shadow .2s ease, transform .2s ease;
  }
  .pub-entry:hover {
    background: #fffdf9;
    border-color: var(--line);
    box-shadow: 0 8px 26px rgba(36,33,28,0.08);
    transform: translateY(-2px);
  }
  .pub-teaser video, .pub-teaser img { border-radius: 8px !important; }
  .pub-title { font-family: 'Newsreader', serif !important; font-size: 1.18rem !important; font-weight: 600; color: var(--ink); }
  .pub-authors { color: var(--ink-soft) !important; }
  .pub-authors a { color: var(--link) !important; border-bottom: 1px solid rgba(122,31,43,0.25); }
  .pub-authors a:hover { color: var(--accent-2) !important; border-bottom-color: var(--accent-2); }
  .pub-venue { color: var(--muted) !important; }

  /* link chips: [Website] [Paper] [Video] — animated pill buttons */
  .pub-links a {
    display: inline-block;
    margin: .4rem .5rem 0 0 !important;
    padding: .32rem .8rem;
    font-size: .85rem;
    font-weight: 500;
    color: var(--accent) !important;
    background: transparent;
    border: 1px solid rgba(122,31,43,0.35);
    border-radius: 999px;
    text-decoration: none !important;
    transition: all .2s ease;
  }
  .pub-links a:hover {
    color: #fff !important;
    background: var(--accent);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(122,31,43,0.22);
  }

  /* ---------- affiliation logos ---------- */
  .affiliations img { filter: saturate(.9); transition: transform .25s ease, opacity .25s ease; }
  .affiliations a:hover img { transform: translateY(-3px); opacity: 1; }

  /* ---------- generic buttons (portfolio etc.) ---------- */
  .btn {
    border-radius: 999px;
    transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(36,33,28,0.15); }

  /* ---------- portfolio / archive cards ---------- */
  .archive__item-title { font-family: 'Newsreader', serif !important; }
  .archive__item-teaser { border-radius: var(--radius); overflow: hidden; }
  .archive__item { transition: transform .2s ease; }
  .archive__item:hover { transform: translateY(-3px); }

  /* ---------- footer ---------- */
  .page__footer { background: #f3efe6; color: var(--muted); border-top: 1px solid var(--line); }
  .page__footer a { color: var(--ink-soft); }
  .page__footer a:hover { color: var(--accent); }

  /* ---------- responsive tweaks ---------- */
  @media (max-width: 768px) {
    .page__title { font-size: 1.8rem; }
  }
</style>

<!-- end custom head snippets -->
